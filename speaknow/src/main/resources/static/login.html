<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SpeakNow AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/assets/css/elevenlabs-theme.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter','system-ui','sans-serif'],
                        serif: ['EB Garamond', 'Georgia', 'serif']
                    },
                    colors: {
                        primary: {
                            50: '#fafafa',
                            100: '#f5f5f5',
                            200: '#e7e5e4',
                            300: '#d6d3d1',
                            400: '#a8a29e',
                            500: '#78716c',
                            600: '#292524',
                            700: '#1c1917',
                            800: '#0c0a09',
                            900: '#0c0a09'
                        },
                        surface: {
                            50: '#f5f5f5',
                            100: '#fafafa',
                            200: '#e7e5e4',
                            300: '#d6d3d1',
                            400: '#a8a29e',
                            500: '#78716c',
                            600: '#292524',
                            700: '#1c1917',
                            800: '#ffffff',
                            900: '#0c0a09'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-50 text-surface-600 font-sans antialiased min-h-screen flex justify-center items-center relative py-12 px-4 sm:px-6 lg:px-8">
    
    <!-- ElevenLabs Ambient Background Orbs -->
    <div class="orb-container">
        <div class="orb orb-mint"></div>
        <div class="orb orb-peach"></div>
        <div class="orb orb-lavender"></div>
        <div class="orb orb-sky"></div>
    </div>

    <div class="elevenlabs-card p-8 md:p-10 w-full max-w-[420px] bg-white border border-surface-200 shadow-sm rounded-2xl relative z-10">
        <div class="text-center mb-8">
            <h1 class="font-serif font-light text-3.5xl text-surface-900 tracking-tight mb-2">🗣️ SpeakNow AI</h1>
            <p class="text-sm text-surface-500">Sign in to your learning account</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label for="username" class="block text-xs uppercase tracking-wider font-bold text-surface-500 mb-2">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required
                       class="w-full px-4 py-3 border border-surface-200 rounded-lg text-sm bg-white text-surface-900 focus:outline-none focus:border-primary-600 focus:ring-1 focus:ring-primary-600 transition-colors">
                <div class="error-message text-red-500 text-xs mt-1.5" id="usernameError" style="display: none;"></div>
            </div>

            <div>
                <label for="password" class="block text-xs uppercase tracking-wider font-bold text-surface-500 mb-2">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required
                       class="w-full px-4 py-3 border border-surface-200 rounded-lg text-sm bg-white text-surface-900 focus:outline-none focus:border-primary-600 focus:ring-1 focus:ring-primary-600 transition-colors">
                <div class="error-message text-red-500 text-xs mt-1.5" id="passwordError" style="display: none;"></div>
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="rememberMe" name="rememberMe"
                       class="h-4 w-4 rounded border-surface-300 text-primary-600 focus:ring-primary-500 accent-primary-600">
                <label for="rememberMe" class="ml-2 block text-sm text-surface-500">Remember me</label>
            </div>

            <button type="submit" id="loginBtn"
                    class="w-full py-3 bg-primary-600 hover:bg-primary-700 active:bg-primary-800 text-white rounded-full font-medium transition-all shadow-sm flex items-center justify-center gap-2">
                Sign In
            </button>
            
            <div class="loading text-center" id="loading" style="display: none;">
                <div class="inline-block animate-spin rounded-full h-5 w-5 border-2 border-primary-600 border-t-transparent"></div>
            </div>
            
            <div class="error-message text-red-500 text-sm text-center" id="generalError" style="display: none;"></div>
            <div class="success-message text-green-600 text-sm text-center" id="generalSuccess" style="display: none;"></div>
        </form>

        <div class="relative flex py-5 items-center">
            <div class="flex-grow border-t border-surface-200"></div>
            <span class="flex-shrink mx-4 text-xs text-surface-400 font-medium">New to SpeakNow?</span>
            <div class="flex-grow border-t border-surface-200"></div>
        </div>

        <button onclick="window.location.href='/register.html'"
                class="w-full py-3 border border-surface-200 hover:border-surface-300 hover:bg-surface-50 active:bg-surface-100 text-surface-700 rounded-full font-medium transition-all text-sm text-center block">
            Create Account
        </button>
    </div>


    <script>
        const API_BASE_URL = window.location.origin + '/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // Reset error messages
            document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
            document.getElementById('generalSuccess').style.display = 'none';

            if (!username || !password) {
                document.getElementById('generalError').textContent = 'Username dan password harus diisi';
                document.getElementById('generalError').style.display = 'block';
                return;
            }

            // Show loading
            document.getElementById('loginBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                let data = {};
                try {
                    data = await response.json();
                } catch (err) {
                    console.warn('Login response is not valid JSON', err);
                }

                if (!response.ok) {
                    document.getElementById('generalError').textContent = data.error || 'Login gagal';
                    document.getElementById('generalError').style.display = 'block';
                    return;
                }

                // Store token
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                if (rememberMe) {
                    localStorage.setItem('username', username);
                }

                // Show success message
                document.getElementById('generalSuccess').textContent = 'Login berhasil! Redirecting...';
                document.getElementById('generalSuccess').style.display = 'block';

                // Redirect ke dashboard setelah 1 detik
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('generalError').textContent = 'Terjadi kesalahan. Silakan coba lagi.';
                document.getElementById('generalError').style.display = 'block';
            } finally {
                document.getElementById('loginBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        });

        // Load saved username jika ada
        window.addEventListener('load', () => {
            const savedUsername = localStorage.getItem('username');
            if (savedUsername) {
                document.getElementById('username').value = savedUsername;
                document.getElementById('rememberMe').checked = true;
            }
        });
    </script>
</body>
</html>
