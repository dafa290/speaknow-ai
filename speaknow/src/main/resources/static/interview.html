<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakNow AI — Job Interview Simulation</title>
    <script src="/assets/js/auth-helper.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/assets/css/elevenlabs-theme.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter','system-ui','sans-serif'],
                        serif: ['EB Garamond', 'Georgia', 'serif']
                    },
                    colors: {
                        primary: {
                            50: '#fafafa',
                            100: '#f5f5f5',
                            200: '#e7e5e4',
                            300: '#d6d3d1',
                            400: '#a8a29e',
                            500: '#78716c',
                            600: '#292524',
                            700: '#1c1917',
                            800: '#0c0a09',
                            900: '#0c0a09'
                        },
                        surface: {
                            50: '#f5f5f5',
                            100: '#fafafa',
                            200: '#e7e5e4',
                            300: '#d6d3d1',
                            400: '#a8a29e',
                            500: '#78716c',
                            600: '#292524',
                            700: '#1c1917',
                            800: '#ffffff',
                            900: '#0c0a09'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-50 text-surface-600 font-sans antialiased min-h-screen relative">

    <!-- ElevenLabs Ambient Background Orbs -->
    <div class="orb-container">
        <div class="orb orb-mint"></div>
        <div class="orb orb-peach"></div>
        <div class="orb orb-lavender"></div>
        <div class="orb orb-sky"></div>
    </div>

    <div class="container mx-auto px-6 py-8 max-w-3xl relative z-10">

        <!-- Header Nav -->
        <div class="flex justify-between items-center mb-8">
            <a href="index.html" class="flex items-center gap-2 text-surface-500 hover:text-surface-900 text-sm font-medium transition-colors">
                <i class="fas fa-arrow-left text-xs"></i> Back to Dashboard
            </a>
            <div class="bg-primary-600 text-white px-5 py-2 rounded-full shadow-sm text-sm font-medium flex items-center gap-2">
                <i class="fas fa-briefcase text-xs"></i> Job Interview Mode
            </div>
        </div>

        <!-- Timer -->
        <div id="timerContainer" class="text-center mb-6">
            <div class="inline-flex items-center gap-2 bg-white border border-surface-200 rounded-full px-6 py-2.5 shadow-sm">
                <i class="fas fa-hourglass-half text-surface-400"></i>
                <span id="timer" class="text-2xl font-light font-serif text-surface-900 tracking-tight">00:00</span>
            </div>
        </div>

        <!-- Question Card -->
        <div class="elevenlabs-card bg-white border border-surface-200 rounded-2xl p-8 mb-5 shadow-sm">
            <div class="flex items-start gap-4">
                <div class="w-11 h-11 bg-surface-100 border border-surface-200 rounded-full flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-user-tie text-surface-500"></i>
                </div>
                <div>
                    <p class="text-xs text-surface-400 uppercase tracking-wider font-bold mb-2">HR Interviewer</p>
                    <p id="question" class="text-xl font-serif font-light text-surface-900 leading-relaxed">Loading...</p>
                    <p id="difficulty" class="text-xs text-surface-400 mt-3 font-medium"></p>
                </div>
            </div>
        </div>

        <!-- Answer Input -->
        <div class="elevenlabs-card bg-white border border-surface-200 rounded-2xl p-6 mb-5 shadow-sm">
            <label class="block text-xs text-surface-400 uppercase tracking-wider font-bold mb-3">Your Answer</label>
            <textarea id="answer" rows="4"
                      class="w-full border border-surface-200 rounded-xl p-4 focus:outline-none focus:border-primary-600 focus:ring-1 focus:ring-primary-600 bg-surface-50 text-surface-900 text-sm leading-relaxed resize-none transition-colors"
                      placeholder="Type your answer here..."></textarea>
            <div class="flex gap-2 mt-4">
                <button id="hintBtn" type="button"
                        class="flex-1 bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-white font-medium py-3 rounded-full transition-all shadow-sm flex items-center justify-center gap-2">
                    <i class="fas fa-lightbulb text-xs"></i> Get Hint
                </button>
                <button id="submitBtn" type="button"
                        class="flex-1 bg-primary-600 hover:bg-primary-700 active:bg-primary-800 text-white font-medium py-3 rounded-full transition-all shadow-sm flex items-center justify-center gap-2">
                    <i class="fas fa-paper-plane text-xs"></i> Submit Answer
                </button>
            </div>
        </div>

        <!-- Hint Display -->
        <div id="hintDisplay" class="hidden elevenlabs-card bg-amber-50 border border-amber-200 rounded-2xl p-5 mb-5 shadow-sm">
            <div class="flex items-start gap-3">
                <div class="w-8 h-8 rounded-full bg-amber-100 text-amber-700 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-lightbulb"></i>
                </div>
                <div class="flex-1">
                    <p class="text-xs uppercase tracking-wider font-bold text-amber-800 mb-1">Interview Tip & Guide</p>
                    <p id="hintText" class="text-amber-900 text-sm leading-relaxed"></p>
                </div>
                <button onclick="document.getElementById('hintDisplay').classList.add('hidden')" class="text-amber-500 hover:text-amber-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <!-- Result Card -->
        <div id="resultCard" class="hidden elevenlabs-card bg-white border border-surface-200 rounded-2xl p-6 mb-6 shadow-sm">
            <h3 class="font-serif font-light text-2xl text-surface-900 mb-5 flex items-center gap-2">
                <i class="fas fa-chart-line text-base text-surface-400"></i> Score Breakdown
            </h3>
            <div class="space-y-4">
                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <span class="text-xs uppercase tracking-wider font-bold text-surface-500">📝 Grammar</span>
                        <span id="grammarScore" class="font-serif font-light text-xl text-surface-900">0/10</span>
                    </div>
                    <div class="w-full bg-surface-100 rounded-full h-1.5">
                        <div id="grammarBar" class="bg-primary-600 h-1.5 rounded-full transition-all duration-700" style="width: 0%"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <span class="text-xs uppercase tracking-wider font-bold text-surface-500">🔍 Clarity</span>
                        <span id="clarityScore" class="font-serif font-light text-xl text-surface-900">0/10</span>
                    </div>
                    <div class="w-full bg-surface-100 rounded-full h-1.5">
                        <div id="clarityBar" class="bg-primary-600 h-1.5 rounded-full transition-all duration-700" style="width: 0%"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <span class="text-xs uppercase tracking-wider font-bold text-surface-500">💪 Confidence</span>
                        <span id="confidenceScore" class="font-serif font-light text-xl text-surface-900">0/10</span>
                    </div>
                    <div class="w-full bg-surface-100 rounded-full h-1.5">
                        <div id="confidenceBar" class="bg-primary-600 h-1.5 rounded-full transition-all duration-700" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="mt-5 space-y-3">
                <div id="comment" class="p-4 bg-surface-50 border border-surface-200 rounded-xl text-surface-700 text-sm leading-relaxed"></div>
                <div id="feedback" class="p-4 bg-surface-50 border border-surface-200 rounded-xl text-surface-700 text-sm leading-relaxed"></div>
                <div id="followUp" class="p-4 bg-surface-50 border border-surface-200 rounded-xl">
                    <p class="text-xs font-bold uppercase tracking-wider text-surface-500 mb-1">🎯 Follow-up Question</p>
                    <p id="followUpText" class="text-surface-700 text-sm leading-relaxed"></p>
                </div>
            </div>
            <button id="nextBtn"
                    class="mt-5 w-full hidden border border-surface-200 hover:border-surface-300 hover:bg-surface-50 text-surface-700 py-3 rounded-full transition-all font-medium text-sm">
                Next Question →
            </button>
        </div>
    </div>

    <script>
        let currentQuestion = '';
        let currentDifficulty = '';
        let timeLimit = 0;
        let timerInterval;
        let timeLeft;

        function startTimer() {
            timeLeft = timeLimit;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer').innerHTML = '00:00';
                    alert('Time is up! Submitting your answer...');
                    submitAnswer();
                } else {
                    timeLeft--;
                    updateTimerDisplay();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').innerHTML = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            if (timeLeft <= 10) {
                document.getElementById('timer').classList.add('text-red-500');
            }
        }

        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
        }

        async function loadQuestion() {
            try {
                const response = await fetch('/api/interview/question?difficulty=random');
                const data = await response.json();

                currentQuestion = data.question;
                currentDifficulty = data.difficulty;
                timeLimit = data.timeLimit;

                document.getElementById('question').innerText = currentQuestion;
                document.getElementById('difficulty').innerHTML = `<i class="fas fa-signal mr-1"></i> Difficulty: ${currentDifficulty}`;
                document.getElementById('resultCard').classList.add('hidden');
                document.getElementById('answer').value = '';
                document.getElementById('answer').disabled = false;
                document.getElementById('submitBtn').disabled = false;
                if (document.getElementById('hintBtn')) document.getElementById('hintBtn').disabled = false;
                document.getElementById('nextBtn').classList.add('hidden');
                document.getElementById('timer').classList.remove('text-red-500');
                
                const hintDisplay = document.getElementById('hintDisplay');
                if (hintDisplay) hintDisplay.classList.add('hidden');

                stopTimer();
                startTimer();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function submitAnswer() {
            stopTimer();

            const answer = document.getElementById('answer').value;
            if (!answer.trim()) {
                alert('Please write your answer first!');
                startTimer();
                return;
            }

            document.getElementById('answer').disabled = true;
            document.getElementById('submitBtn').disabled = true;
            if (document.getElementById('hintBtn')) document.getElementById('hintBtn').disabled = true;
            
            const hintDisplay = document.getElementById('hintDisplay');
            if (hintDisplay) hintDisplay.classList.add('hidden');

            try {
                const savedUser = localStorage.getItem('user');
                const currentUser = savedUser ? JSON.parse(savedUser) : null;
                const userId = currentUser?.id || localStorage.getItem('userId') || '1';
                const response = await fetch('/api/interview/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        question: currentQuestion,
                        answer: answer,
                        difficulty: currentDifficulty
                    })
                });

                const result = await response.json();
                const score = result.score;

                document.getElementById('grammarScore').innerText = score.grammar + '/10';
                document.getElementById('clarityScore').innerText = score.clarity + '/10';
                document.getElementById('confidenceScore').innerText = score.confidence + '/10';
                document.getElementById('grammarBar').style.width = (score.grammar * 10) + '%';
                document.getElementById('clarityBar').style.width = (score.clarity * 10) + '%';
                document.getElementById('confidenceBar').style.width = (score.confidence * 10) + '%';
                document.getElementById('comment').innerHTML = '<i class="fas fa-comment-dots mr-2 text-surface-400"></i> ' + score.comment;
                document.getElementById('feedback').innerHTML = '<i class="fas fa-lightbulb mr-2 text-surface-400"></i> ' + score.feedback;
                document.getElementById('followUpText').innerHTML = result.followUp;

                document.getElementById('resultCard').classList.remove('hidden');
                document.getElementById('nextBtn').classList.remove('hidden');

            } catch (error) {
                console.error('Error:', error);
                alert('Error evaluating answer.');
            }
        }

        document.getElementById('submitBtn').addEventListener('click', submitAnswer);
        document.getElementById('nextBtn').addEventListener('click', loadQuestion);
        
        const hintBtn = document.getElementById('hintBtn');
        if (hintBtn) {
            hintBtn.addEventListener('click', async () => {
                const hintDisplay = document.getElementById('hintDisplay');
                const hintText = document.getElementById('hintText');
                if (!hintDisplay || !hintText) return;
                
                hintDisplay.classList.remove('hidden');
                hintText.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Fetching interview tip...';
                
                try {
                    const response = await fetch('/api/hint', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: document.getElementById('answer').value.trim(),
                            lastAIMessage: currentQuestion,
                            mode: 'interview'
                        })
                    });
                    const result = await response.json();
                    if (result.hint) {
                        hintText.innerText = result.hint;
                    } else {
                        hintText.innerText = 'Gagal memuat petunjuk wawancara.';
                    }
                } catch (error) {
                    console.error('Error fetching interview hint:', error);
                    hintText.innerText = 'Gagal memuat petunjuk wawancara.';
                }
            });
        }

        loadQuestion();
    </script>
</body>
</html>
