<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SpeakNow AI</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/assets/css/elevenlabs-theme.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter','system-ui','sans-serif'],
                        serif: ['EB Garamond', 'Georgia', 'serif']
                    },
                    colors: {
                        primary: {
                            50: '#fafafa',
                            100: '#f5f5f5',
                            200: '#e7e5e4',
                            300: '#d6d3d1',
                            400: '#a8a29e',
                            500: '#78716c',
                            600: '#292524',
                            700: '#1c1917',
                            800: '#0c0a09',
                            900: '#0c0a09'
                        },
                        surface: {
                            50: '#f5f5f5',
                            100: '#fafafa',
                            200: '#e7e5e4',
                            300: '#d6d3d1',
                            400: '#a8a29e',
                            500: '#78716c',
                            600: '#292524',
                            700: '#1c1917',
                            800: '#ffffff',
                            900: '#0c0a09'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .password-strength {
            height: 5px;
            background: #e7e5e4;
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background-color 0.3s;
            border-radius: 3px;
        }

        .password-strength.weak .password-strength-bar {
            width: 33%;
            background-color: #ef4444;
        }

        .password-strength.medium .password-strength-bar {
            width: 66%;
            background-color: #f59e0b;
        }

        .password-strength.strong .password-strength-bar {
            width: 100%;
            background-color: #10b981;
        }
    </style>
    <link rel="stylesheet" href="/assets/css/tailwind-compiled.css">
</head>
<body class="bg-stone-50 text-stone-600 font-sans antialiased min-h-screen flex justify-center items-center relative py-12 px-4 sm:px-6 lg:px-8">
    
    <!-- ElevenLabs Ambient Background Orbs -->
    <div class="orb-container">
        <div class="orb orb-mint"></div>
        <div class="orb orb-peach"></div>
        <div class="orb orb-lavender"></div>
        <div class="orb orb-sky"></div>
    </div>

    <div class="elevenlabs-card p-8 md:p-10 w-full max-w-[440px] bg-white border border-stone-200 shadow-sm rounded-2xl relative z-10">
        <div class="text-center mb-8">
            <h1 class="font-serif font-light text-3.5xl text-stone-900 tracking-tight mb-2">🗣️ SpeakNow AI</h1>
            <p class="text-sm text-stone-500">Create your account to get started</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label for="name" class="block text-xs uppercase tracking-wider font-bold text-stone-500 mb-1.5">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name"
                       class="w-full px-4 py-2.5 border border-stone-200 rounded-lg text-sm bg-white text-stone-900 focus:outline-none focus:border-stone-600 focus:ring-1 focus:ring-stone-600 transition-colors">
                <div class="error-message text-red-500 text-xs mt-1.5" id="nameError" style="display: none;"></div>
            </div>

            <div>
                <label for="username" class="block text-xs uppercase tracking-wider font-bold text-stone-500 mb-1.5">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose your username" required
                       class="w-full px-4 py-2.5 border border-stone-200 rounded-lg text-sm bg-white text-stone-900 focus:outline-none focus:border-stone-600 focus:ring-1 focus:ring-stone-600 transition-colors">
                <div class="error-message text-red-500 text-xs mt-1.5" id="usernameError" style="display: none;"></div>
            </div>

            <div>
                <label for="email" class="block text-xs uppercase tracking-wider font-bold text-stone-500 mb-1.5">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required
                       class="w-full px-4 py-2.5 border border-stone-200 rounded-lg text-sm bg-white text-stone-900 focus:outline-none focus:border-stone-600 focus:ring-1 focus:ring-stone-600 transition-colors">
                <div class="error-message text-red-500 text-xs mt-1.5" id="emailError" style="display: none;"></div>
            </div>

            <div>
                <label for="password" class="block text-xs uppercase tracking-wider font-bold text-stone-500 mb-1.5">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required
                       class="w-full px-4 py-2.5 border border-stone-200 rounded-lg text-sm bg-white text-stone-900 focus:outline-none focus:border-stone-600 focus:ring-1 focus:ring-stone-600 transition-colors">
                <div class="password-strength" id="passwordStrength">
                    <div class="password-strength-bar"></div>
                </div>
                <div class="error-message text-red-500 text-xs mt-1.5" id="passwordError" style="display: none;"></div>
            </div>

            <div>
                <label for="confirmPassword" class="block text-xs uppercase tracking-wider font-bold text-stone-500 mb-1.5">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required
                       class="w-full px-4 py-2.5 border border-stone-200 rounded-lg text-sm bg-white text-stone-900 focus:outline-none focus:border-stone-600 focus:ring-1 focus:ring-stone-600 transition-colors">
                <div class="error-message text-red-500 text-xs mt-1.5" id="confirmPasswordError" style="display: none;"></div>
            </div>

            <button type="submit" id="registerBtn"
                    class="w-full py-3 bg-stone-600 hover:bg-stone-700 active:bg-stone-800 text-white rounded-full font-medium transition-all shadow-sm flex items-center justify-center gap-2 mt-2">
                Create Account
            </button>
            
            <div class="loading text-center" id="loading" style="display: none;">
                <div class="inline-block animate-spin rounded-full h-5 w-5 border-2 border-stone-600 border-t-transparent"></div>
            </div>
            
            <div class="error-message text-red-500 text-sm text-center" id="generalError" style="display: none;"></div>
            <div class="success-message text-green-600 text-sm text-center" id="generalSuccess" style="display: none;"></div>
        </form>

        <div class="relative flex py-4 items-center">
            <div class="flex-grow border-t border-stone-200"></div>
            <span class="flex-shrink mx-4 text-xs text-stone-400 font-medium">Already have an account?</span>
            <div class="flex-grow border-t border-stone-200"></div>
        </div>

        <button onclick="window.location.href='/login.html'"
                class="w-full py-3 border border-stone-200 hover:border-stone-300 hover:bg-stone-50 active:bg-stone-100 text-stone-700 rounded-full font-medium transition-all text-sm text-center block">
            Back to Login
        </button>
    </div>

    <script>
        const API_BASE_URL = window.location.origin + '/api';

        // Password strength checker
        document.getElementById('password').addEventListener('input', (e) => {
            const password = e.target.value;
            const strengthDiv = document.getElementById('passwordStrength');
            
            strengthDiv.classList.remove('weak', 'medium', 'strong');
            
            if (password.length === 0) {
                return;
            }
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            if (strength <= 1) {
                strengthDiv.classList.add('weak');
            } else if (strength <= 2) {
                strengthDiv.classList.add('medium');
            } else {
                strengthDiv.classList.add('strong');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Reset error messages
            document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
            document.getElementById('generalSuccess').style.display = 'none';

            // Validate inputs
            if (!username || !email || !password) {
                document.getElementById('generalError').textContent = 'Username, email, dan password harus diisi';
                document.getElementById('generalError').style.display = 'block';
                return;
            }

            if (!email.includes('@')) {
                document.getElementById('emailError').textContent = 'Email tidak valid';
                document.getElementById('emailError').style.display = 'block';
                return;
            }

            if (password.length < 6) {
                document.getElementById('passwordError').textContent = 'Password minimal 6 karakter';
                document.getElementById('passwordError').style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                document.getElementById('confirmPasswordError').textContent = 'Password tidak cocok';
                document.getElementById('confirmPasswordError').style.display = 'block';
                return;
            }

            // Show loading
            document.getElementById('registerBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: name || username,
                        username: username,
                        email: email,
                        password: password
                    })
                });

                let data = {};
                try {
                    data = await response.json();
                } catch (err) {
                    console.warn('Register response is not valid JSON', err);
                }

                if (!response.ok) {
                    document.getElementById('generalError').textContent = data.error || 'Registrasi gagal';
                    document.getElementById('generalError').style.display = 'block';
                    return;
                }

                // Store token
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Show success message
                document.getElementById('generalSuccess').textContent = 'Registrasi berhasil! Redirecting...';
                document.getElementById('generalSuccess').style.display = 'block';

                // Redirect ke dashboard setelah 1 detik
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('generalError').textContent = 'Terjadi kesalahan. Silakan coba lagi.';
                document.getElementById('generalError').style.display = 'block';
            } finally {
                document.getElementById('registerBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        });
    </script>
</body>
</html>
