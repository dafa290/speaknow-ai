<svg viewBox="0 0 280 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background orb hint -->
  <circle cx="240" cy="30" r="70" fill="#6ee7b7" opacity="0.12"/>
  <!-- Large speech bubble -->
  <rect x="20" y="30" width="140" height="80" rx="18" fill="white" opacity="0.6"/>
  <path d="M40 110 L28 132 L62 110Z" fill="white" opacity="0.6"/>
  <!-- Bubble lines (text stripes) -->
  <rect x="36" y="52" width="80" height="7" rx="3.5" fill="#292524" opacity="0.12"/>
  <rect x="36" y="66" width="60" height="7" rx="3.5" fill="#292524" opacity="0.12"/>
  <rect x="36" y="80" width="70" height="7" rx="3.5" fill="#292524" opacity="0.10"/>
  <!-- Small reply bubble -->
  <rect x="120" y="100" width="120" height="60" rx="14" fill="#292524" opacity="0.08"/>
  <path d="M218 100 L232 80 L200 100Z" fill="#292524" opacity="0.08"/>
  <!-- Reply lines -->
  <rect x="134" y="116" width="70" height="6" rx="3" fill="#292524" opacity="0.12"/>
  <rect x="134" y="128" width="50" height="6" rx="3" fill="#292524" opacity="0.10"/>
  <!-- Mic icon hint -->
  <rect x="218" y="138" width="18" height="26" rx="9" fill="#10b981" opacity="0.25"/>
  <path d="M212 155 Q218 168 227 155" stroke="#10b981" stroke-width="2" fill="none" opacity="0.35"/>
  <line x1="227" y1="162" x2="227" y2="168" stroke="#10b981" stroke-width="2" opacity="0.35"/>
  <!-- Sparkle dots -->
  <circle cx="180" cy="50" r="4" fill="#6ee7b7" opacity="0.6"/>
  <circle cx="200" cy="36" r="2.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="168" cy="25" r="2" fill="#fbbf24" opacity="0.5"/>
</svg>
